<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Long Unread Meter Fine Calculator</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3fbfd;
      color: #002b4f;
    }

    .calculator {
      max-width: 820px;
      margin: 40px auto;
      background: white;
      border: 1px solid #d3e7ef;
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(0, 43, 79, 0.12);
      overflow: hidden;
    }

    .header {
      background: #eaf8fc;
      padding: 28px;
      border-bottom: 1px solid #d3e7ef;
    }

    .logo {
      height: 55px;
      margin-bottom: 18px;
      display: block;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 30px;
      color: #002b4f;
    }

    .subtitle {
      margin: 0;
      color: #456176;
      font-size: 16px;
    }

    .content {
      padding: 28px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
      color: #001b33;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 16px;
      font-size: 24px;
      border: 1px solid #cfe3eb;
      border-radius: 12px;
      outline: none;
      margin-bottom: 24px;
    }

    input:focus {
      border-color: #15849a;
      box-shadow: 0 0 0 3px rgba(21, 132, 154, 0.15);
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    button {
      border: 1px solid #cfe3eb;
      background: white;
      color: #002b4f;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: bold;
      cursor: pointer;
    }

    button.active {
      background: #15849a;
      color: white;
      border-color: #15849a;
    }

    .results {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }

    .card {
      border: 1px solid #d3e7ef;
      border-radius: 12px;
      padding: 18px;
      background: white;
    }

    .card.highlight {
      background: #e8f8ef;
    }

    .card-title {
      font-weight: bold;
      font-size: 14px;
      color: #52687a;
      margin-bottom: 10px;
    }

    .card-value {
      font-size: 28px;
      font-weight: bold;
      color: #001b33;
    }

    .note {
      border: 1px solid #d3e7ef;
      border-radius: 10px;
      padding: 14px 16px;
      color: #40566a;
      background: #fbfdff;
      font-size: 14px;
    }

    @media (max-width: 700px) {
      .calculator {
        margin: 18px;
      }

      .results {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 25px;
      }

      .logo {
        height: 45px;
      }
    }
  </style>
</head>

<body>

  <div class="calculator">
    <div class="header">
      <img src="logo.jpg" alt="Occutrace Logo" class="logo" />

      <h1>Long Unread Meter Fine Calculator</h1>
      <p class="subtitle">
        Enter the number of long unread meters to estimate the potential fine exposure.
      </p>
    </div>

    <div class="content">
      <label for="meters">Number of long unread meters</label>
      <input type="text" id="meters" value="15,160" />

      <div class="buttons">
        <button onclick="setMode('oneYear')" id="oneYearBtn">
          1 year no action
        </button>

        <button onclick="setMode('additional')" id="additionalBtn" class="active">
          18 months–2 years additional
        </button>

        <button onclick="setMode('total')" id="totalBtn">
          Total exposure
        </button>
      </div>

      <div class="results">
        <div class="card">
          <div class="card-title">Meters entered</div>
          <div class="card-value" id="metersDisplay">15,160</div>
        </div>

        <div class="card">
          <div class="card-title" id="rateTitle">Additional rate</div>
          <div class="card-value" id="rateDisplay">£80</div>
        </div>

        <div class="card highlight">
          <div class="card-title" id="fineTitle">Additional fine</div>
          <div class="card-value" id="fineDisplay">£1,212,800</div>
        </div>
      </div>

      <div class="note" id="calculationNote">
        Calculation: long unread meters x £80 additional charge if no action after 18 months to 2 years.
      </div>
    </div>
  </div>

  <script>
    let mode = "additional";

    const rates = {
      oneYear: {
        rate: 40,
        rateTitle: "Fine rate",
        fineTitle: "Estimated fine",
        note: "Calculation: long unread meters x £40 charge after 1 year no action."
      },

      additional: {
        rate: 80,
        rateTitle: "Additional rate",
        fineTitle: "Additional fine",
        note: "Calculation: long unread meters x £80 additional charge if no action after 18 months to 2 years."
      },

      total: {
        rate: 120,
        rateTitle: "Total rate",
        fineTitle: "Total exposure",
        note: "Calculation: long unread meters x £120 total potential exposure."
      }
    };

    function cleanNumber(value) {
      return Number(value.replace(/,/g, "")) || 0;
    }

    function formatNumber(value) {
      return value.toLocaleString("en-GB");
    }

    function formatCurrency(value) {
      return "£" + value.toLocaleString("en-GB");
    }

    function setMode(selectedMode) {
      mode = selectedMode;

      document.querySelectorAll("button").forEach(button => {
        button.classList.remove("active");
      });

      document.getElementById(selectedMode + "Btn").classList.add("active");

      calculate();
    }

    function calculate() {
      const input = document.getElementById("meters");
      const meters = cleanNumber(input.value);
      const selected = rates[mode];
      const fine = meters * selected.rate;

      input.value = formatNumber(meters);

      document.getElementById("metersDisplay").textContent = formatNumber(meters);
      document.getElementById("rateTitle").textContent = selected.rateTitle;
      document.getElementById("rateDisplay").textContent = formatCurrency(selected.rate);
      document.getElementById("fineTitle").textContent = selected.fineTitle;
      document.getElementById("fineDisplay").textContent = formatCurrency(fine);
      document.getElementById("calculationNote").textContent = selected.note;
    }

    document.getElementById("meters").addEventListener("input", calculate);

    calculate();
  </script>

</body>
</html>
